<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EMILIA 15</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700&display=swap" rel="stylesheet">

<style>

:root{
--rosa:#ff00b7;
--plateado:#e6e6e6;
}

html{scroll-behavior:smooth;}

body{
margin:0;
font-family:Montserrat;
background:black;
color:white;
text-align:center;
overflow-x:hidden;
}


/* fondo bolas */

.bg{
position:fixed;
width:100%;
height:100%;
background:url("disco.png");
opacity:0.15;
animation:moveBg 20s linear infinite;
z-index:-1;
}

@keyframes moveBg{
0%{background-position:0 0}
100%{background-position:400px 400px}
}


/* hero */

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

h1{
font-size:80px;
color:var(--rosa);
text-shadow:0 0 30px var(--rosa);
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 10px var(--rosa)}
to{text-shadow:0 0 40px var(--rosa)}
}


/* botones */

.btn{
background:var(--rosa);
padding:15px 25px;
border-radius:30px;
color:white;
text-decoration:none;
display:inline-block;
box-shadow:0 0 10px var(--rosa);
margin-top:10px;
}


/* secciones */

.section{
padding:70px 20px;
}

.card{
border:1px solid var(--plateado);
padding:20px;
border-radius:20px;
margin:20px;
}


/* galeria */

.gallery img{
width:80%;
margin:10px;
border-radius:15px;
}


/* overlay gracias */

#thanks{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:flex;
justify-content:center;
align-items:center;
visibility:hidden;
opacity:0;
transition:.5s;
z-index:999;
}

#thanks.show{
visibility:visible;
opacity:1;
}

.thanksBox{
border:2px solid #ff00b7;
padding:40px;
border-radius:20px;
box-shadow:0 0 40px #ff00b7;
}


/* confetti */

.confetti{
position:fixed;
width:10px;
height:10px;
background:silver;
top:-10px;
animation:fall 3s linear infinite;
}

@keyframes fall{
to{transform:translateY(100vh) rotate(360deg);}
}


/* audio btn */

#audioBtn{
position:fixed;
bottom:20px;
right:20px;
background:var(--rosa);
padding:15px;
border-radius:50%;
cursor:pointer;
}

</style>
</head>

<body>

<div class="bg"></div>


<audio id="music" loop>
<source src="music.mp3">
</audio>

<audio id="fx">
<source src="fx.mp3">
</audio>

<div id="audioBtn" onclick="toggleMusic()">🎵</div>


<!-- HERO -->

<div class="hero">

<h1>EMILIA</h1>

<h2>Mis 15</h2>

<div id="countdown"></div>

<a href="#info" class="btn">Ver invitación</a>

</div>


<!-- FECHA -->

<div id="info" class="section">

<h2>Fecha</h2>

<div class="card">

24 Abril 2026<br>
21:30 hs

</div>

</div>


<!-- SALON -->

<div class="section">

<h2>Salón Mandarina</h2>

<div class="card">

<a class="btn"
href="https://maps.google.com"
target="_blank">

Cómo llegar

</a>

</div>

</div>


<!-- RSVP -->

<div class="section">

<h2>Confirmar asistencia</h2>

<div class="card">

<form
action="https://docs.google.com/forms/d/e/1FAIpQLScMe4Rb96guisn6-cKJy9Erl5rUc7nsfIhsH_9Y7km8uRGRZw/formResponse"
method="POST"
target="_blank"
>

<input name="entry.2005620554" placeholder="Nombre" required>
<br>

<select name="entry.1045781291">
<option>Confirmo asistencia</option>
<option>No puedo asistir</option>
</select>

<br>

<input name="entry.839337160" placeholder="Mensaje">

<br>

<button class="btn" type="submit" onclick="showThanks()">
Confirmar
</button>

</form>

</div>

</div>


<!-- DRESS -->

<div class="section">

<h2>Dress Code</h2>

Elegante · Glam · Blanco · Plateado · Rosa

</div>


<!-- GALERIA -->

<div class="section">

<h2>Fotos</h2>

<div class="gallery">

<img src="1.jpg">
<img src="2.jpg">
<img src="3.jpg">

</div>

</div>


<!-- SONGS -->

<div class="section">

<h2>Canciones</h2>

<input id="song">
<button onclick="addSong()">Agregar</button>

<ul id="list"></ul>

</div>



<!-- overlay gracias -->

<div id="thanks">

<div class="thanksBox">

<h2>Gracias por confirmar</h2>

<p>Nos vemos en los 15 de EMILIA 🪩</p>

</div>

</div>



<script>


/* countdown */

var fecha = new Date("Apr 24, 2026 21:30:00").getTime();

setInterval(()=>{

var now = new Date().getTime();

var d = fecha-now;

var dias = Math.floor(d/(1000*60*60*24));
var h = Math.floor((d%(1000*60*60*24))/(1000*60*60));
var m = Math.floor((d%(1000*60*60))/(1000*60));
var s = Math.floor((d%(1000*60))/1000);

document.getElementById("countdown").innerHTML =
dias+"d "+h+"h "+m+"m "+s+"s";

},1000);



function addSong(){

let s=document.getElementById("song").value;

let li=document.createElement("li");

li.textContent=s;

document.getElementById("list").appendChild(li);

}



function toggleMusic(){

let m=document.getElementById("music");

if(m.paused) m.play();
else m.pause();

}



function showThanks(){

setTimeout(()=>{

document.getElementById("thanks").classList.add("show");

document.getElementById("fx").play();

confetti();

},500)

}



function confetti(){

for(let i=0;i<40;i++){

let c=document.createElement("div");

c.className="confetti";

c.style.left=Math.random()*100+"%";

c.style.animationDuration=
(2+Math.random()*3)+"s";

document.body.appendChild(c);

}

}


</script>

</body>
</html>
